<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Регистрация и вход</title>
  <style>
    body { font-family: Arial; display: flex; flex-direction: column; align-items: center; margin-top: 80px; }
    input { margin: 6px; padding: 8px; width: 200px; }
    button { padding: 8px 16px; margin-top: 8px; cursor: pointer; }
  </style>
</head>
<body>

  <h2>Регистрация</h2>
  <input type="text" id="regLogin" placeholder="Логин"><br>
  <input type="password" id="regPassword" placeholder="Пароль"><br>
  <button onclick="register()">Зарегистрироваться</button>

  <h2>Авторизация</h2>
  <input type="text" id="authLogin" placeholder="Логин"><br>
  <input type="password" id="authPassword" placeholder="Пароль"><br>
  <button onclick="login()">Войти</button>

  <p id="message" style="color:red;"></p>

  <script>
    function register() {
      const login = document.getElementById('regLogin').value.trim();
      const password = document.getElementById('regPassword').value.trim();

      if (!login || !password) {
        showMessage("Введите логин и пароль для регистрации");
        return;
      }

      localStorage.setItem('userLogin', login);
      localStorage.setItem('userPassword', password);

      showMessage("Регистрация успешна! Теперь войдите.");
    }

    function login() {
      const login = document.getElementById('authLogin').value.trim();
      const password = document.getElementById('authPassword').value.trim();

      const savedLogin = localStorage.getItem('userLogin');
      const savedPassword = localStorage.getItem('userPassword');

      if (login === savedLogin && password === savedPassword) {
        window.location.href = "welcome.html"; // переход на страницу приветствия
      } else {
        showMessage("Неверный логин или пароль!");
      }
    }

    function showMessage(text) {
      document.getElementById('message').innerText = text;
    }
  </script>

</body>
</html>
