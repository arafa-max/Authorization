<script>
    
function togglePassword() {
  const input = document.getElementById("password");
  const eye = document.getElementById("eye");

  if (input.type === "password") {
    input.type = "text";
    eye.src = "image/trailing-icon1.svg";
    eye.style.transform = "scale(1.2)";
    setTimeout(() => eye.style.transform = "scale(1)", 200);
  } else {
    input.type = "password";
    eye.src = "image/trailing-icon.svg";
    eye.style.transform = "scale(1.2)";
    setTimeout(() => eye.style.transform = "scale(1)", 200);
  }
}

function login() {
  const loginInput = document.getElementById('emai-input').value.trim();
  const passwordInput = document.getElementById('password').value.trim();

  // Получаем объект userData из localStorage
  const userDataJSON = localStorage.getItem('userData');
  if (!userDataJSON) {
    showMessage("Нет зарегистрированных пользователей!");
    return;
  }

  const userData = JSON.parse(userDataJSON);

  // Сравниваем введённый email и пароль с сохранёнными
  if (loginInput === userData.email && passwordInput === userData.password) {
    window.location.href = "hello.html"; // переход на страницу приветствия
  } else {
    showMessage("Неверный логин или пароль!");
  }
}

function showMessage(text) {
  const msg = document.getElementById('message');
  if (msg) {
    msg.innerText = text;
    msg.style.color = "red";
    msg.style.marginTop = "10px";
  }
}


</script>
